<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>You're on the list — Wandori</title>
    <meta name="description" content="You're on the Wandori waitlist. We'll send one email the day Wandori lands on iOS." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#F7F3EC" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <main class="stage">
      <span class="frame frame--tl" aria-hidden="true"></span>
      <span class="frame frame--br" aria-hidden="true"></span>

      <article class="card">
        <p class="eyebrow reveal" style="--d: 1">
          <span class="dot" aria-hidden="true"></span>Waitlist confirmed
        </p>

        <h1 class="headline headline--thanks reveal" style="--d: 2">
          You're on <em>the&nbsp;list.</em>
        </h1>

        <p class="pitch reveal" style="--d: 3">
          We'll send you one email the day Wandori lands on iOS — no noise
          before then. Your next memory is closer than you think.
        </p>

        <a class="backlink reveal" style="--d: 4" href="index.html">← Back to Wandori</a>

        <footer class="meta reveal" style="--d: 5">
          <span>Wandori — Est. 2026</span>
        </footer>
      </article>
    </main>

    <script type="module" src="/src/thanks.js"></script>
  </body>
</html>
